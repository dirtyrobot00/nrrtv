# Data Source Configurations

# PDF Research Report Sources
pdf_sources:
  - name: naver_finance_research
    type: web_scrape
    enabled: true
    base_url: "https://finance.naver.com/research/company_list.naver"
    description: "Naver Finance Research Reports"

    selectors:
      report_list: "table.type_1 tr"
      title: "td a.tit"
      pdf_link: "td a[href*='.pdf']"
      date: "td.date"
      analyst: "td.comp_name"
      firm: "td.comp_name"

    pagination:
      enabled: true
      max_pages: 10
      page_param: "page"

    rate_limit: 1.0
    timeout: 30

    metadata:
      country: "KR"
      language: "ko"

  - name: samsung_securities
    type: direct_download
    enabled: false  # Requires authentication
    base_url: "https://www.samsungsecurities.com/research"
    description: "Samsung Securities Research"
    login_required: true
    rate_limit: 0.5

  - name: nh_investment
    type: direct_download
    enabled: false
    base_url: "https://www.nhqv.com/research"
    description: "NH Investment & Securities"
    login_required: true
    rate_limit: 0.5

  - name: mirae_asset
    type: direct_download
    enabled: false
    base_url: "https://securities.miraeasset.com/bbs/board/message/list.do"
    description: "Mirae Asset Securities"
    login_required: false
    rate_limit: 0.5

# News Article Sources
news_sources:
  - name: naver_finance_news
    type: web_scrape
    enabled: true
    base_url: "https://finance.naver.com/news/mainnews.naver"
    description: "Naver Finance News"

    params: {}

    selectors:
      article_list: "ul.newsList li, ul.right_list_1_2 li"
      title: "dd.articleSubject a, a"
      link: "dd.articleSubject a, a"
      date: "dd.articleSummary span.wdate, span.wdate"
      summary: "dd.articleSummary"

    pagination:
      enabled: true
      max_pages: 5
      page_param: "page"

    rate_limit: 2.0
    timeout: 20

    metadata:
      country: "KR"
      language: "ko"

  - name: hankyung
    type: web_scrape
    enabled: false
    base_url: "https://www.hankyung.com/finance/stock"
    description: "Hankyung (Korea Economic Daily)"
    rate_limit: 1.5

  - name: maeil_business
    type: web_scrape
    enabled: false
    base_url: "https://www.mk.co.kr/news/stock"
    description: "Maeil Business Newspaper"
    rate_limit: 1.5

